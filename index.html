<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="oled">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف التهجد - التدفق السريع</title>
    
    <style>
        /* 👑 خط مجمع الملك فهد الأصلي 👑 */
        @font-face { 
            font-family: 'Madinah'; 
            src: url('https://cdn.jsdelivr.net/gh/mushaf-ar/quran-web@master/fonts/UthmanicHafs1Ver09.woff2') format('woff2'); 
            font-display: swap; 
        }

        :root, [data-theme="oled"] {
            --bg: #000000; --txt: #D1D5DB; --gold: #D4AF37; --box: rgba(17, 17, 17, 0.95); --frame-out: #222222; --mark-color: #D4AF37;
            --font-family: 'Madinah', serif; --font-size: 24px; 
        }
        [data-theme="navy"] {
            --bg: #0B132B; --txt: #E2E8F0; --gold: #FBBF24; --box: rgba(28, 37, 65, 0.95); --frame-out: #3A506B; --mark-color: #FBBF24;
        }
        [data-theme="sepia"] {
            --bg: #FDF6E3; --txt: #2C1A0B; --gold: #B8860B; --box: rgba(244, 232, 209, 0.95); --frame-out: #8B5A2B; --mark-color: #B8860B;
        }
        [data-theme="light"] {
            --bg: #FFFFFF; --txt: #111827; --gold: #15803D; --box: rgba(243, 244, 246, 0.95); --frame-out: #9CA3AF; --mark-color: #15803D;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0; padding: 0; padding-top: 60px; padding-bottom: 90px; 
            background-color: var(--bg); color: var(--txt);
            font-family: var(--font-family); 
            /* 🚫 تم إلغاء justify لإنقاذ الرموز والتشكيل 🚫 */
            text-align: right; 
            transition: background-color 0.4s, color 0.4s; overflow-x: hidden;
            user-select: none; -webkit-user-select: none;
        }

        .m, .allah { color: var(--mark-color) !important; transition: color 0.3s ease; }

        .container { width: 100%; margin: 0 auto; padding: 10px; box-sizing: border-box; max-width: 850px; }

        .mushaf-page {
            background-color: var(--bg); 
            border: 1px solid var(--frame-out); border-radius: 8px; padding: 20px 15px;
            box-shadow: inset 0 0 0 1px var(--gold);
            min-height: 85vh; transition: all 0.4s;
        }

        /* البار العلوي */
        .glass-header {
            position: fixed; top: 0; left: 0; right: 0; height: 55px; 
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--frame-out); z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.4s ease;
        }
        .icon-btn { background: transparent; color: var(--gold); border: none; font-size: 22px; cursor: pointer; outline: none; }
        .live-location { flex-grow: 1; text-align: center; color: var(--gold); font-family: Arial, sans-serif; font-size: 15px; font-weight:bold; }

        /* شريط الحالة الذكي (Focus Mode) */
        .reading-hud {
            position: fixed; top: 0; left: 0; right: 0; height: 40px; background: var(--bg);
            border-bottom: 1px solid var(--frame-out); z-index: 999;
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            transform: translateY(-100%); opacity: 0; transition: all 0.4s ease;
        }
        body.reading-mode .reading-hud { transform: translateY(0); opacity: 1; }
        body.reading-mode .glass-header { transform: translateY(-100%); }
        body.reading-mode .floating-controls { transform: translate(-50%, 150%); opacity: 0; }
        
        .hud-page-box { background: transparent; color: var(--gold); font-family: Arial, sans-serif; font-weight: bold; font-size: 13px; border: 1px solid var(--gold); padding: 2px 8px; border-radius: 4px;}
        .hud-info { color: var(--txt); font-size: 13px; font-weight: bold; text-align: right; flex-grow: 1; margin-right: 15px; font-family: Arial, sans-serif;}
        .hud-info span { color: var(--gold); font-size: 12px; }

        .progress-container { position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: rgba(0,0,0,0.1); }
        .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }

        /* الكبسولة السفلية */
        .floating-controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--frame-out); border-radius: 30px;
            display: flex; justify-content: center; align-items: center; padding: 5px 15px; gap: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1000; transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .ctrl-btn { background: transparent; color: var(--txt); border: none; font-size: 14px; font-weight: bold; cursor: pointer; padding: 8px; font-family: Arial, sans-serif;}
        .play-btn { background: var(--gold); color: var(--bg); border-radius: 20px; padding: 8px 25px; font-size: 15px; }

        /* ترويسة السورة */
        .combined-header {
            display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 5px;
            border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
            padding: 10px; margin: 30px 0 15px 0; background-color: rgba(255,255,255,0.02);
            text-align: center;
        }
        .sura-name { color: var(--gold); font-weight: normal; font-size: calc(var(--font-size) * 1.3); }
        .sura-name::before, .sura-name::after { content: ' ۞ '; font-size: 70%; }
        .basmalah-inline { color: var(--txt); font-size: var(--font-size); }

        /* 👑 محرك الخطوط المعالج والحر 👑 */
        .quran-text { 
            font-size: var(--font-size); 
            line-height: 2.2; /* مساحة واسعة تمنع تداخل الحركات */
            text-rendering: optimizeLegibility; 
            transition: font-size 0.3s; 
            display: inline; /* السماح للكلمات بالتدفق الطبيعي */
        }
        
        .ayah-num { 
            position: relative; display: inline-flex; align-items: center; justify-content: center; 
            width: calc(var(--font-size) * 1.8); height: calc(var(--font-size) * 1.8); 
            font-size: calc(var(--font-size) * 0.8); font-family: Arial, sans-serif; font-weight: bold; 
            color: var(--txt); margin: 0 5px; vertical-align: middle; z-index: 1; line-height: 1;
        }
        .ayah-num::before { 
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--gold); 
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 C 80 10 95 30 95 50 C 95 70 80 90 50 95 C 20 90 5 70 5 50 C 5 30 20 10 50 5 Z" fill="none" stroke="black" stroke-width="6"/><circle cx="50" cy="50" r="35" fill="none" stroke="black" stroke-width="2"/></svg>') center/contain no-repeat; 
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 C 80 10 95 30 95 50 C 95 70 80 90 50 95 C 20 90 5 70 5 50 C 5 30 20 10 50 5 Z" fill="none" stroke="black" stroke-width="6"/><circle cx="50" cy="50" r="35" fill="none" stroke="black" stroke-width="2"/></svg>') center/contain no-repeat; z-index: -1; 
        }

        /* القوائم السفلية */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; background: var(--box);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 2px solid var(--gold); border-radius: 25px 25px 0 0;
            padding: 25px 20px; z-index: 2000; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8); font-family: Arial, sans-serif;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-title { text-align: center; color: var(--gold); font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        .sheet-close { position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: var(--txt); font-size: 20px; cursor: pointer; }
        
        .settings-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .setting-select { background: rgba(128,128,128,0.2); color: var(--txt); border: 1px solid var(--frame-out); padding: 12px; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; outline: none; flex: 1; text-align: center; appearance: none;}
        .size-control { display: flex; justify-content: center; align-items: center; background: rgba(128,128,128,0.2); border: 1px solid var(--frame-out); border-radius: 10px; padding: 5px; flex: 1; }
        .sz-btn { background: transparent; border: none; color: var(--txt); font-size: 22px; padding: 0 20px; cursor: pointer; }
        .sz-disp { color: var(--gold); font-weight: bold; font-size: 18px; min-width: 30px; text-align: center; }

        #loading { text-align: center; font-size: 16px; color: var(--gold); padding: 40px; font-weight: bold; font-family: Arial, sans-serif;}
        #sentinel { height: 50px; } 

        .toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; z-index: 10001; transition: top 0.5s ease; font-family: Arial, sans-serif;}
        .toast.show { top: 70px; }
    </style>
</head>
<body>

    <div class="glass-header" id="topBar">
        <button class="icon-btn" onclick="openSheet('settingsSheet')">⚙️</button>
        <div class="live-location" id="liveLocation">جاري التحميل...</div>
        <button class="icon-btn" onclick="openSheet('indexSheet')">📖</button>
    </div>

    <div class="reading-hud" id="readingHud">
        <div class="hud-page-box" id="hudPageBox">ص ١</div>
        <div class="hud-info" id="hudInfo">سورة ... <span id="hudRemain"></span></div>
        <div class="progress-container"><div class="progress-bar" id="topProgressBar"></div></div>
    </div>

    <div id="celebrationToast" class="toast">✨ بدأت في الجزء الجديد</div>

    <div class="floating-controls" id="bottomBar">
        <button class="ctrl-btn" onclick="pageUp()">أعلى 🔼</button>
        <button class="ctrl-btn play-btn" id="pBtn" onclick="toggleAutoScroll(event)">تلقائي ⏵</button>
        <button class="ctrl-btn" onclick="pageDown()">أسفل 🔽</button>
    </div>

    <div class="bottom-sheet" id="indexSheet">
        <button class="sheet-close" onclick="closeSheets()">✖</button>
        <div class="sheet-title">الفهرس السريع</div>
        <select class="setting-select" id="juzIndex" onchange="jumpTo('juz', this.value)"></select>
        <select class="setting-select" id="suraIndex" onchange="jumpTo('surah', this.value)"></select>
    </div>

    <div class="bottom-sheet" id="settingsSheet">
        <button class="sheet-close" onclick="closeSheets()">✖</button>
        <div class="sheet-title">إعدادات العرض</div>
        <div class="settings-row">
            <select class="setting-select" id="themeSelect" onchange="changeTheme(this.value)">
                <option value="oled">🌑 ليلي عميق</option>
                <option value="navy">🌌 كحلي هادئ</option>
                <option value="sepia">📜 ورق عتيق</option>
                <option value="light">☀️ نهار ناصع</option>
            </select>
        </div>
        <div class="settings-row">
            <div class="size-control">
                <button class="sz-btn" onclick="changeFontSize(1)">+</button>
                <span class="sz-disp" id="sizeDisplay">24</span>
                <button class="sz-btn" onclick="changeFontSize(-1)">-</button>
            </div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="mushaf-page">
            <div id="content"></div>
            <div id="loading" style="display:none;">جاري جلب الآيات... ⏳</div>
            <div id="sentinel"></div>
        </div>
    </div>

    <script>
        let currentFontSize = 24; 
        let currentMode = 'surah'; let currentIndex = 1; let isFetching = false; let lastSuraRendered = '';
        let activeChunkIndex = null; let root = document.documentElement;

        function saveSetting(key, value) { localStorage.setItem(key, value); }
        
        document.addEventListener("DOMContentLoaded", () => {
            let savedSize = localStorage.getItem('quran_size'); if(savedSize) { currentFontSize = parseInt(savedSize); root.style.setProperty('--font-size', currentFontSize + 'px'); document.getElementById('sizeDisplay').innerText = currentFontSize; } else { root.style.setProperty('--font-size', '24px'); }
            let savedTheme = localStorage.getItem('quran_theme_mode') || 'oled'; root.setAttribute('data-theme', savedTheme); document.getElementById('themeSelect').value = savedTheme;

            const juzSelect = document.getElementById('juzIndex'); juzSelect.innerHTML = '<option value="" disabled selected>📜 اختر الجزء...</option>'; for(let i=1; i<=30; i++) juzSelect.innerHTML += `<option value="${i}">الجزء ${toAr(i)}</option>`;
            const suraNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
            const suraSelect = document.getElementById('suraIndex'); suraSelect.innerHTML = '<option value="" disabled selected>📖 اختر السورة...</option>'; suraNames.forEach((name, i) => suraSelect.innerHTML += `<option value="${i+1}">${i+1}. ${name}</option>`);

            let savedMode = localStorage.getItem('quran_last_mode') || 'surah'; let savedIndex = localStorage.getItem('quran_last_index') || 1;
            if(savedMode === 'juz') document.getElementById('juzIndex').value = savedIndex; else document.getElementById('suraIndex').value = savedIndex;
            loadData(savedMode, savedIndex);
        });

        function openSheet(id) { document.getElementById(id).classList.add('active'); document.body.classList.remove('reading-mode');}
        function closeSheets() { document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active')); }
        
        function jumpTo(mode, index) {
            if (!index) return;
            if (mode === 'juz') document.getElementById('suraIndex').selectedIndex = 0; else document.getElementById('juzIndex').selectedIndex = 0;
            loadData(mode, index); closeSheets(); 
        }

        const toAr = (n) => n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
        
        function calculateSmartProgress() {
            const chunks = document.querySelectorAll('.quran-chunk');
            let activeChunk = null; let activeRect = null;
            chunks.forEach(chunk => {
                const rect = chunk.getBoundingClientRect();
                if (rect.top <= window.innerHeight * 0.6 && rect.bottom >= window.innerHeight * 0.4) { activeChunk = chunk; activeRect = rect; }
            });

            if (activeChunk && activeRect) {
                const anchors = activeChunk.querySelectorAll('.scroll-anchor');
                let currentSura = ""; let currentJuz = "";
                anchors.forEach(a => {
                    const aRect = a.getBoundingClientRect();
                    if (aRect.top <= window.innerHeight * 0.4) { currentSura = a.getAttribute('data-sura'); currentJuz = a.getAttribute('data-juz'); }
                });
                
                if(!currentSura && anchors.length > 0) { currentSura = anchors[0].getAttribute('data-sura'); currentJuz = anchors[0].getAttribute('data-juz'); }
                
                const modeName = activeChunk.getAttribute('data-mode') === 'juz' ? 'الجزء' : 'السورة';
                const itemIndex = parseInt(activeChunk.getAttribute('data-index'));
                
                if(currentSura) { 
                    document.getElementById('liveLocation').innerText = `سورة ${currentSura} • الجزء ${toAr(currentJuz)}`; 
                    document.getElementById('hudInfo').innerHTML = `سورة ${currentSura} <span id="hudRemain"></span>`;
                }

                if (activeChunkIndex !== null && itemIndex > activeChunkIndex) {
                    const toast = document.getElementById('celebrationToast');
                    toast.innerText = `✨ ما شاء الله! بدأت الآن في ${modeName} ${toAr(itemIndex)}`;
                    toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3500);
                }
                activeChunkIndex = itemIndex;

                const h = window.innerHeight;
                let scrolledInside = Math.max(0, -activeRect.top); 
                let currentPage = Math.floor(scrolledInside / h) + 1;
                let totalPages = Math.ceil(activeRect.height / h);
                let remaining = Math.max(0, totalPages - currentPage);
                let percent = Math.min(100, Math.max(0, ((scrolledInside + h) / activeRect.height) * 100));

                const topProgressBar = document.getElementById('topProgressBar');
                topProgressBar.style.width = percent + '%';
                if(percent > 85) { topProgressBar.style.backgroundColor = '#22C55E'; } else { topProgressBar.style.backgroundColor = 'var(--gold)'; }

                document.getElementById('hudPageBox').innerText = `شاشة ${toAr(currentPage)}`;
                if(remaining > 0) { document.getElementById('hudRemain').innerHTML = `(متبقي ${toAr(remaining)})`; } else { document.getElementById('hudRemain').innerHTML = `<span style="color:#22C55E;">(أوشكت على الختم! 👏)</span>`; }
            }
        }

        window.addEventListener('scroll', calculateSmartProgress); window.addEventListener('resize', calculateSmartProgress);

        function changeTheme(val) { root.setAttribute('data-theme', val); localStorage.setItem('quran_theme_mode', val); }
        function changeFontSize(step) {
            currentFontSize += step; if(currentFontSize < 10) currentFontSize = 10; if(currentFontSize > 60) currentFontSize = 60;
            root.style.setProperty('--font-size', currentFontSize + 'px');
            document.getElementById('sizeDisplay').innerText = currentFontSize; saveSetting('quran_size', currentFontSize);
            setTimeout(calculateSmartProgress, 100); 
        }

        function applyColors(text) {
            // إزالة المسافات التي تفصل الرموز عن الحروف
            text = text.replace(/\s+([\u06D6-\u06DC\u06DF-\u06E3\u06E8\u06E9\u06ED])/g, '$1');
            
            let res = text.replace(/(ٱللَّهِ|ٱللَّهُ|ٱللَّهَ|لِلَّهِ|اللَّهِ|اللَّهُ|اللَّهَ)/g, '<span class="allah">$1</span>');
            res = res.replace(/([\u06D6-\u06DC\u06DF-\u06E3\u06E8\u06E9\u06ED])/g, '<span class="m">$1</span>'); return res;
        }

        async function loadData(mode, index, append = false) {
            index = parseInt(index);
            if ((mode === 'juz' && index > 30) || (mode === 'surah' && index > 114)) {
                document.getElementById('sentinel').style.display = 'none'; document.getElementById('loading').innerHTML = 'تم الختم 🌙'; document.getElementById('loading').style.display = 'block'; return;
            } else { document.getElementById('sentinel').style.display = 'block'; }

            isFetching = true; document.getElementById('loading').style.display = 'block';
            if (!append) { document.getElementById('content').innerHTML = ''; lastSuraRendered = ''; activeChunkIndex = null; window.scrollTo(0,0); }

            try {
                const response = await fetch(`https://api.alquran.cloud/v1/${mode}/${index}/quran-uthmani`);
                const data = await response.json();
                
                let innerHtml = ''; let lastJuzRendered = 0;

                data.data.ayahs.forEach((ayah) => {
                    if (ayah.surah.name !== lastSuraRendered || ayah.juz !== lastJuzRendered) {
                        innerHtml += `<span class="scroll-anchor" data-sura="${ayah.surah.name}" data-juz="${ayah.juz}"></span>`;
                    }
                    lastJuzRendered = ayah.juz;

                    if (ayah.surah.name !== lastSuraRendered) {
                        lastSuraRendered = ayah.surah.name;
                        innerHtml += `<div class="combined-header"><span class="sura-name">${lastSuraRendered}</span>`;
                        if (ayah.surah.number !== 1 && ayah.surah.number !== 9) { innerHtml += `<span class="basmalah-inline">${applyColors("بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ")}</span>`; }
                        innerHtml += `</div>`;
                    }
                    
                    let text = ayah.text;
                    if (ayah.numberInSurah === 1 && ayah.surah.number !== 1 && ayah.surah.number !== 9) { 
                        text = text.replace("بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ", "").replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "").replace("بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ", "").replace(/بِسۡمِ.*?ٱلرَّحِيمِ\s*/, "").trim();
                    }

                    innerHtml += `<span class="quran-text">${applyColors(text)}</span><span class="ayah-num">${toAr(ayah.numberInSurah)}</span> `;
                });

                const chunkHtml = `<div class="quran-chunk" data-mode="${mode}" data-index="${index}">${innerHtml}</div>`;

                if (append) { document.getElementById('content').insertAdjacentHTML('beforeend', chunkHtml); } 
                else { document.getElementById('content').innerHTML = chunkHtml; }
                
                currentMode = mode; currentIndex = index;
                saveSetting('quran_last_mode', mode); saveSetting('quran_last_index', index);
                setTimeout(calculateSmartProgress, 300); 
                
            } catch (error) { document.getElementById('loading').innerHTML = '<span style="color:red">خطأ بالاتصال</span>'; } 
            finally { isFetching = false; if(document.getElementById('loading').innerHTML !== 'تم الختم 🌙') document.getElementById('loading').style.display = 'none'; }
        }

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isFetching && document.getElementById('content').innerHTML.trim() !== '') { loadData(currentMode, currentIndex + 1, true); }
        });
        observer.observe(document.getElementById('sentinel'));

        let sInt; let isS = false; let speed = 0.5;
        function toggleAutoScroll(e) {
            if(e) e.stopPropagation(); 
            const btn = document.getElementById('pBtn'); closeSheets();

            if (isS) { 
                clearInterval(sInt); isS = false; 
                btn.innerHTML = 'تلقائي ⏵'; btn.style.backgroundColor = 'var(--gold)'; btn.style.color = 'var(--bg)';
            } else { 
                sInt = setInterval(() => window.scrollBy({ top: speed * 3, behavior: 'auto' }), 50); isS = true; 
                btn.innerHTML = 'إيقاف ⏸'; btn.style.backgroundColor = '#DC2626'; btn.style.color = 'white';
                document.body.classList.add('reading-mode'); 
            }
        }

        // 🌟 التقليب الذكي بلمس الشاشة 🌟
        document.getElementById('mainContainer').addEventListener('click', (e) => { 
            if (isS) { toggleAutoScroll(); return; }
            closeSheets();

            const screenWidth = window.innerWidth; const clickX = e.clientX;
            // النزول بشاشة كاملة (ناقص 40 بيكسل ليبقى سياق بسيط جداً)
            const jumpHeight = window.innerHeight - 40; 

            if (clickX < screenWidth * 0.35) {
                // لمس اليسار = نزول
                window.scrollBy({ top: jumpHeight, behavior: 'smooth' });
                document.body.classList.add('reading-mode');
            } else if (clickX > screenWidth * 0.65) {
                // لمس اليمين = صعود
                window.scrollBy({ top: -jumpHeight, behavior: 'smooth' });
                document.body.classList.add('reading-mode');
            } else {
                // لمس المنتصف = وضع القراءة
                document.body.classList.toggle('reading-mode');
            }
        });

        function pageDown() { window.scrollBy({ top: window.innerHeight - 40, behavior: 'smooth' }); document.body.classList.add('reading-mode'); }
        function pageUp() { window.scrollBy({ top: -(window.innerHeight - 40), behavior: 'smooth' }); document.body.classList.add('reading-mode'); }

    </script>
</body>
</html>
