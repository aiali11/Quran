<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف التهجد - الفاخر</title>
    <style>
        :root {
            --bg: #000000; --box: rgba(20, 20, 20, 0.9); --gold: #D4AF37; --frame-out: #333333;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
            font-family: Arial, sans-serif;
        }
        
        /* 👑 حاوية صفحة المصحف 👑 */
        .page-container {
            width: 100%; max-width: 600px; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        
        /* الصورة مخفية حتى يتم تحميلها بالكامل */
        .quran-image {
            width: 100%; height: 100%; object-fit: contain;
            transition: filter 0.4s ease; display: none; 
        }
        
        /* السحر: قلب الألوان للوضع الليلي (الأسود العميق) */
        body.dark-mode .quran-image {
            filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.2);
        }
        
        /* البار العلوي (شريط الحالة) */
        .reading-hud {
            position: fixed; top: 0; left: 0; right: 0; height: 50px; 
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--frame-out); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            transform: translateY(0); transition: transform 0.4s ease;
        }
        body.focus-mode .reading-hud { transform: translateY(-100%); }

        .hud-info { color: var(--gold); font-size: 15px; font-weight: bold; flex-grow: 1; text-align: center; }
        .hud-page-box { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .icon-btn { background: transparent; color: var(--gold); border: none; font-size: 22px; cursor: pointer; outline: none; }

        /* نافذة الفهرس */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; background: var(--box);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 2px solid var(--frame-out); border-radius: 25px 25px 0 0;
            padding: 25px 20px; z-index: 2000; transition: bottom 0.4s ease;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-title { text-align: center; color: var(--gold); font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        .sheet-close { position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: var(--gold); font-size: 20px; cursor: pointer; }
        .setting-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--gold); padding: 12px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; outline: none; width: 100%; margin-bottom: 15px; text-align: center; appearance: none;}

        /* الكبسولة السفلية */
        .floating-controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--frame-out); border-radius: 30px;
            display: flex; justify-content: center; align-items: center; padding: 5px 20px; gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1000; transition: transform 0.4s ease, opacity 0.4s ease;
        }
        body.focus-mode .floating-controls { transform: translate(-50%, 150%); opacity: 0; }
        
        .ctrl-btn { background: transparent; color: #fff; border: none; font-size: 16px; font-weight: bold; cursor: pointer; padding: 8px; }

        /* مناطق اللمس لتقليب الصفحات بيد واحدة */
        .touch-zone { position: absolute; top: 0; bottom: 0; z-index: 500; }
        .touch-left { left: 0; width: 40%; }
        .touch-right { right: 0; width: 40%; }
        .touch-center { left: 40%; width: 20%; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 16px; font-weight: bold; z-index: 100;}
    </style>
</head>
<body class="dark-mode">

    <div class="reading-hud" id="readingHud">
        <button class="icon-btn" onclick="openIndex()" title="الفهرس">📖</button>
        <div class="hud-info" id="hudInfo">جاري التحميل...</div>
        <button class="icon-btn" onclick="toggleTheme()" title="تغيير اللون">🌓</button>
    </div>

    <div class="page-container">
        <div id="loading">جاري جلب الصفحة ⏳...</div>
        <img id="quranImage" class="quran-image" src="" alt="صفحة القرآن">
        
        <div class="touch-zone touch-left" onclick="nextPage()"></div>
        <div class="touch-zone touch-center" onclick="toggleFocus()"></div>
        <div class="touch-zone touch-right" onclick="prevPage()"></div>
    </div>

    <div class="floating-controls" id="bottomBar">
        <button class="ctrl-btn" onclick="prevPage()">السابق</button>
        <div class="hud-page-box" id="hudPageBox" style="margin:0 10px;">ص ١</div>
        <button class="ctrl-btn" onclick="nextPage()">التالي</button>
    </div>

    <div class="bottom-sheet" id="indexSheet">
        <button class="sheet-close" onclick="closeIndex()">✖</button>
        <div class="sheet-title">الفهرس السريع</div>
        <select class="setting-select" id="juzIndex" onchange="jumpTo('juz', this.value)"></select>
        <select class="setting-select" id="suraIndex" onchange="jumpTo('surah', this.value)"></select>
    </div>

    <script>
        let currentPage = parseInt(localStorage.getItem('quran_page')) || 1;
        const totalPages = 604;
        let isFetching = false;
        const toAr = (n) => n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

        document.addEventListener("DOMContentLoaded", () => {
            // تفعيل الوضع الليلي أو النهاري
            let savedTheme = localStorage.getItem('quran_theme_mode');
            if (savedTheme === 'light') document.body.classList.remove('dark-mode');
            
            // تعبئة الفهارس
            const juzSelect = document.getElementById('juzIndex'); juzSelect.innerHTML = '<option value="" disabled selected>📜 اختر الجزء...</option>'; for(let i=1; i<=30; i++) juzSelect.innerHTML += `<option value="${i}">الجزء ${toAr(i)}</option>`;
            const suraNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
            const suraSelect = document.getElementById('suraIndex'); suraSelect.innerHTML = '<option value="" disabled selected>📖 اختر السورة...</option>'; suraNames.forEach((name, i) => suraSelect.innerHTML += `<option value="${i+1}">${i+1}. ${name}</option>`);

            loadPage(currentPage);
        });

        // 🌟 دالة جلب الصور من جامعة الملك سعود 🌟
        async function loadPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages || isFetching) return;
            isFetching = true;
            
            document.getElementById('loading').innerText = 'جاري جلب الصفحة ⏳...';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('quranImage').style.display = 'none';
            
            const img = document.getElementById('quranImage');
            // هنا السيرفر الرسمي والمضمون 100%
            img.src = `https://quran.ksu.edu.sa/ayat/safahat1/${pageNum}.png`;
            
            img.onload = () => {
                document.getElementById('loading').style.display = 'none';
                img.style.display = 'block';
                isFetching = false;
            };
            
            img.onerror = () => {
                document.getElementById('loading').innerText = '❌ فشل تحميل الصورة. تأكد من الاتصال بالإنترنت.';
                isFetching = false;
            };

            // تحديث بيانات الشريط العلوي (السورة والجزء)
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/page/${pageNum}/quran-uthmani`);
                const data = await res.json();
                const suraName = data.data.ayahs[0].surah.name;
                const juzNum = data.data.ayahs[0].juz;
                
                document.getElementById('hudInfo').innerText = `سورة ${suraName} • الجزء ${toAr(juzNum)}`;
                document.getElementById('hudPageBox').innerText = `ص ${toAr(pageNum)}`;
                
                currentPage = pageNum;
                localStorage.setItem('quran_page', currentPage);
            } catch(e) {}
        }

        // 🌟 دالة الانتقال الذكي من الفهرس 🌟
        async function jumpTo(mode, index) {
            if (!index) return;
            closeIndex();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = 'جاري البحث... ⏳';
            document.getElementById('quranImage').style.display = 'none';
            
            try {
                // نسأل قاعدة البيانات: في أي صفحة يبدأ هذا الجزء/السورة؟
                const response = await fetch(`https://api.alquran.cloud/v1/${mode}/${index}`);
                const data = await response.json();
                const startPage = data.data.ayahs[0].page;
                
                if (mode === 'juz') document.getElementById('suraIndex').selectedIndex = 0; 
                else document.getElementById('juzIndex').selectedIndex = 0;
                
                loadPage(startPage); // القفز لصفحة السورة
            } catch(e) {
                document.getElementById('loading').innerText = '❌ حدث خطأ';
            }
        }

        function openIndex() { document.getElementById('indexSheet').classList.add('active'); document.body.classList.remove('focus-mode'); }
        function closeIndex() { document.getElementById('indexSheet').classList.remove('active'); }

        function nextPage() { if(currentPage < totalPages) loadPage(currentPage + 1); }
        function prevPage() { if(currentPage > 1) loadPage(currentPage - 1); }
        
        // وضع التركيز والقراءة
        function toggleFocus() { document.body.classList.toggle('focus-mode'); closeIndex(); }
        
        // تغيير الثيم
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            if(document.body.classList.contains('dark-mode')) { localStorage.setItem('quran_theme_mode', 'dark'); } 
            else { localStorage.setItem('quran_theme_mode', 'light'); }
        }
    </script>
</body>
</html>
