<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف التهجد - الرول المتصل</title>
    <style>
        :root {
            --bg: #000000; --box: rgba(20, 20, 20, 0.9); --gold: #D4AF37; --frame-out: #333333;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; 
            font-family: Arial, sans-serif; scroll-behavior: smooth;
        }
        
        /* 👑 البار العلوي 👑 */
        .glass-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px; 
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gold); z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.4s ease;
        }
        body.reading-mode .glass-header { transform: translateY(-100%); }

        .icon-btn { background: transparent; color: var(--gold); border: none; font-size: 24px; cursor: pointer; outline: none; }
        .live-location { flex-grow: 1; text-align: center; color: var(--gold); font-size: 16px; font-weight: bold; }

        /* 👑 الكبسولة السفلية 👑 */
        .floating-controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--gold); border-radius: 30px;
            display: flex; justify-content: center; align-items: center; padding: 5px 15px; gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); z-index: 1000; transition: transform 0.4s ease, opacity 0.4s ease;
        }
        body.reading-mode .floating-controls { transform: translate(-50%, 150%); opacity: 0; }
        .ctrl-btn { background: transparent; color: #fff; border: none; font-size: 14px; font-weight: bold; cursor: pointer; padding: 8px 12px; }
        .play-btn { background: var(--gold); color: #000; border-radius: 20px; padding: 8px 25px; font-size: 15px; }

        /* 👑 حاوية الرول المتصل (السحر هنا) 👑 */
        .scroll-container {
            width: 100%; max-width: 700px; margin-top: 60px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; /* يمنع ظهور الأطراف المقصوصة */
        }

        /* 👑 هندسة قص الصور ودمجها 👑 */
        .quran-page {
            width: 116%; /* تكبير الصورة لدفع الهوامش خارج الشاشة */
            margin-left: -8%; margin-right: -8%; /* توسيط بعد التكبير */
            margin-top: -6%; margin-bottom: -6%; /* دمج نهاية الصفحة مع بداية الصفحة التالية */
            display: block; pointer-events: none;
            transition: filter 0.4s ease;
        }

        /* الفلاتر السينمائية */
        body[data-theme="oled"] .quran-page { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.3); }
        body[data-theme="navy"] .quran-page { filter: invert(1) sepia(1) hue-rotate(170deg) saturate(2) brightness(0.8) contrast(1.3); }
        body[data-theme="sepia"] .quran-page { filter: sepia(0.4) brightness(0.9) contrast(1.2); }
        body[data-theme="light"] .quran-page { filter: contrast(1.1); }

        /* النوافذ */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; background: var(--box);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 2px solid var(--gold); border-radius: 25px 25px 0 0;
            padding: 25px 20px; z-index: 2000; transition: bottom 0.4s ease; box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-title { text-align: center; color: var(--gold); font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        .sheet-close { position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        .setting-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--gold); padding: 12px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; outline: none; width: 100%; margin-bottom: 15px; text-align: center; appearance: none;}

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 18px; font-weight: bold; z-index: 100; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 10px; display: none;}
        
        /* منطقة لمس للتركيز */
        .focus-zone { position: fixed; top: 10%; bottom: 10%; left: 20%; right: 20%; z-index: 500; }
    </style>
</head>
<body data-theme="oled">

    <div class="glass-header" id="topBar">
        <button class="icon-btn" onclick="openSheet('settingsSheet')">⚙️</button>
        <div class="live-location" id="liveLocation">جاري التحميل...</div>
        <button class="icon-btn" onclick="openSheet('indexSheet')">📖</button>
    </div>

    <div id="loading">جاري جلب الآيات ⏳...</div>

    <div class="scroll-container" id="scrollContainer"></div>

    <div class="focus-zone" onclick="toggleFocus()"></div>

    <div class="floating-controls" id="bottomBar">
        <button class="ctrl-btn" onclick="changeSpeed(-0.2)">أبطأ 🐢</button>
        <button class="ctrl-btn play-btn" id="pBtn" onclick="toggleAutoScroll()">تلقائي ⏵</button>
        <button class="ctrl-btn" onclick="changeSpeed(0.2)">أسرع 🐇</button>
    </div>

    <div class="bottom-sheet" id="indexSheet">
        <button class="sheet-close" onclick="closeSheets()">✖</button>
        <div class="sheet-title">الفهرس السريع</div>
        <select class="setting-select" id="juzIndex" onchange="loadQuranChunk('juz', this.value)"></select>
        <select class="setting-select" id="suraIndex" onchange="loadQuranChunk('surah', this.value)"></select>
    </div>

    <div class="bottom-sheet" id="settingsSheet">
        <button class="sheet-close" onclick="closeSheets()">✖</button>
        <div class="sheet-title">إعدادات العرض السينمائي</div>
        <select class="setting-select" id="themeSelect" onchange="changeTheme(this.value)">
            <option value="oled">🌑 ليلي عميق (OLED)</option>
            <option value="navy">🌌 كحلي هادئ</option>
            <option value="sepia">📜 ورق عتيق</option>
            <option value="light">☀️ نهار ناصع</option>
        </select>
    </div>

    <script>
        const toAr = (n) => n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
        let sInt; let isS = false; let speed = 0.8;

        document.addEventListener("DOMContentLoaded", () => {
            let savedTheme = localStorage.getItem('quran_theme_mode') || 'oled';
            document.body.setAttribute('data-theme', savedTheme); document.getElementById('themeSelect').value = savedTheme;

            const juzSelect = document.getElementById('juzIndex'); juzSelect.innerHTML = '<option value="" disabled selected>📜 اختر الجزء...</option>'; for(let i=1; i<=30; i++) juzSelect.innerHTML += `<option value="${i}">الجزء ${toAr(i)}</option>`;
            const suraNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
            const suraSelect = document.getElementById('suraIndex'); suraSelect.innerHTML = '<option value="" disabled selected>📖 اختر السورة...</option>'; suraNames.forEach((name, i) => suraSelect.innerHTML += `<option value="${i+1}">${i+1}. ${name}</option>`);

            loadQuranChunk('surah', 1); // تحميل الفاتحة افتراضياً
        });

        function openSheet(id) { closeSheets(); document.getElementById(id).classList.add('active'); document.body.classList.remove('reading-mode'); }
        function closeSheets() { document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active')); }
        function toggleFocus() { document.body.classList.toggle('focus-mode'); document.body.classList.toggle('reading-mode'); closeSheets(); }
        function changeTheme(val) { document.body.setAttribute('data-theme', val); localStorage.setItem('quran_theme_mode', val); }

        // 🌟 الدالة الجبارة: تحميل السورة/الجزء كشريط متصل 🌟
        async function loadQuranChunk(mode, index) {
            if (!index) return;
            closeSheets();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('scrollContainer').innerHTML = ''; // مسح القديم
            
            if (mode === 'juz') {
                document.getElementById('suraIndex').selectedIndex = 0;
                document.getElementById('liveLocation').innerText = `الجزء ${toAr(index)}`;
            } else {
                document.getElementById('juzIndex').selectedIndex = 0;
                document.getElementById('liveLocation').innerText = `السورة المحددة`;
            }

            try {
                // نسأل قاعدة البيانات: ما هي الصفحة الأولى والأخيرة لهذه السورة/الجزء؟
                const response = await fetch(`https://api.alquran.cloud/v1/${mode}/${index}`);
                const data = await response.json();
                
                const ayahs = data.data.ayahs;
                const startPage = ayahs[0].page;
                const endPage = ayahs[ayahs.length - 1].page;
                const suraName = ayahs[0].surah.name;
                
                document.getElementById('liveLocation').innerText = mode === 'surah' ? `سورة ${suraName}` : `الجزء ${toAr(index)}`;

                const container = document.getElementById('scrollContainer');
                
                // جلب ورص الصفحات فوق بعضها
                for (let p = startPage; p <= endPage; p++) {
                    let img = document.createElement('img');
                    img.className = 'quran-page';
                    img.src = `https://quran.ksu.edu.sa/ayat/safahat1/${p}.png`;
                    container.appendChild(img);
                }

                document.getElementById('loading').style.display = 'none';
                window.scrollTo(0, 0); // العودة لأعلى الصفحة

            } catch (error) {
                document.getElementById('loading').innerText = '❌ حدث خطأ في الاتصال';
            }
        }

        // التمرير التلقائي السلس
        function toggleAutoScroll() {
            const btn = document.getElementById('pBtn');
            if (isS) { 
                clearInterval(sInt); isS = false; 
                btn.innerHTML = 'تلقائي ⏵'; btn.style.backgroundColor = 'var(--gold)'; btn.style.color = '#000';
            } else { 
                sInt = setInterval(() => window.scrollBy({ top: speed * 3, behavior: 'auto' }), 50); isS = true; 
                btn.innerHTML = 'إيقاف ⏸'; btn.style.backgroundColor = '#DC2626'; btn.style.color = 'white';
                document.body.classList.add('reading-mode'); closeSheets();
            }
        }

        function changeSpeed(v) { speed = Math.max(0.2, Math.min(speed + v, 5)); }
    </script>
</body>
</html>
