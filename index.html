<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف التهجد - المطابق</title>
    
    <style>
        :root {
            --bg: #000000; --box: rgba(17, 17, 17, 0.85); --gold: #D4AF37; --frame-out: #222222;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
            font-family: Arial, sans-serif;
        }

        /* 👑 حاوية صفحة المصحف 👑 */
        .page-container {
            width: 100%; max-width: 600px; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* 👑 صورة المصحف مع السحر الليلي 👑 */
        .quran-image {
            width: 100%; height: 100%; object-fit: contain;
            transition: filter 0.4s ease;
        }

        /* السحر: قلب الألوان للوضع الليلي المريح للعين */
        body.dark-mode .quran-image {
            filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.2);
        }

        /* البار العلوي (شريط الحالة) */
        .reading-hud {
            position: fixed; top: 0; left: 0; right: 0; height: 50px; 
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--frame-out); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            transform: translateY(0); transition: transform 0.4s ease;
        }
        body.focus-mode .reading-hud { transform: translateY(-100%); }

        .hud-info { color: var(--gold); font-size: 15px; font-weight: bold; flex-grow: 1; text-align: center; }
        .hud-page-box { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .icon-btn { background: transparent; color: var(--gold); border: none; font-size: 22px; cursor: pointer; outline: none; }

        /* الكبسولة السفلية */
        .floating-controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--box); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--frame-out); border-radius: 30px;
            display: flex; justify-content: center; align-items: center; padding: 5px 20px; gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1000; transition: transform 0.4s ease, opacity 0.4s ease;
        }
        body.focus-mode .floating-controls { transform: translate(-50%, 150%); opacity: 0; }
        
        .ctrl-btn { background: transparent; color: #fff; border: none; font-size: 16px; font-weight: bold; cursor: pointer; padding: 8px; }

        /* مناطق اللمس المخفية لتقليب الصفحات */
        .touch-zone { position: absolute; top: 0; bottom: 0; z-index: 500; }
        .touch-left { left: 0; width: 40%; }
        .touch-right { right: 0; width: 40%; }
        .touch-center { left: 40%; width: 20%; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 18px; font-weight: bold; z-index: 100; display: none;}
    </style>
</head>
<body class="dark-mode"> <div class="reading-hud" id="readingHud">
        <button class="icon-btn" onclick="toggleTheme()" title="تغيير اللون">🌓</button>
        <div class="hud-info" id="hudInfo">جاري التحميل...</div>
        <div class="hud-page-box" id="hudPageBox">ص ١</div>
    </div>

    <div class="page-container">
        <div id="loading">جاري تحميل الصفحة ⏳...</div>
        <img id="quranImage" class="quran-image" src="" alt="صفحة القرآن" onload="imgLoaded()">
        
        <div class="touch-zone touch-left" onclick="nextPage()"></div>
        <div class="touch-zone touch-center" onclick="toggleFocus()"></div>
        <div class="touch-zone touch-right" onclick="prevPage()"></div>
    </div>

    <div class="floating-controls" id="bottomBar">
        <button class="ctrl-btn" onclick="prevPage()">الصفحة السابقة</button>
        <button class="ctrl-btn" style="color:var(--gold);" onclick="toggleFocus()">إخفاء</button>
        <button class="ctrl-btn" onclick="nextPage()">الصفحة التالية</button>
    </div>

    <script>
        let currentPage = parseInt(localStorage.getItem('quran_page')) || 1;
        const totalPages = 604;
        let isFetching = false;

        document.addEventListener("DOMContentLoaded", () => {
            let savedTheme = localStorage.getItem('quran_theme_mode');
            if (savedTheme === 'light') document.body.classList.remove('dark-mode');
            loadPage(currentPage);
        });

        // 🌟 دالة جلب الصورة والبيانات 🌟
        async function loadPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages || isFetching) return;
            isFetching = true;
            document.getElementById('loading').style.display = 'block';
            
            // 1. جلب صورة المصحف عالية الدقة (من سيرفرات موثوقة)
            // نقوم بتنسيق الرقم ليكون 3 خانات (مثل 001, 045, 604)
            let paddedNum = String(pageNum).padStart(3, '0');
            document.getElementById('quranImage').src = `https://raw.githubusercontent.com/quran/quran.com-images/master/width_1024/page${paddedNum}.png`;

            // 2. جلب بيانات الصفحة (السورة والجزء) لتحديث الشريط العلوي
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/page/${pageNum}/quran-uthmani`);
                const data = await res.json();
                const suraName = data.data.ayahs[0].surah.name;
                const juzNum = data.data.ayahs[0].juz;
                
                document.getElementById('hudInfo').innerText = `سورة ${suraName} • الجزء ${juzNum}`;
                document.getElementById('hudPageBox').innerText = `ص ${pageNum}`;
                
                currentPage = pageNum;
                localStorage.setItem('quran_page', currentPage);
            } catch(e) {
                console.log("Error fetching metadata");
            }
        }

        function imgLoaded() {
            document.getElementById('loading').style.display = 'none';
            isFetching = false;
        }

        // 🌟 نظام التقليب الذكي 🌟
        function nextPage() {
            if(currentPage < totalPages) loadPage(currentPage + 1);
        }

        function prevPage() {
            if(currentPage > 1) loadPage(currentPage - 1);
        }

        // 🌟 وضع القراءة الخالي من المشتتات 🌟
        function toggleFocus() {
            document.body.classList.toggle('focus-mode');
        }

        // 🌟 تبديل الوضع الليلي/النهاري 🌟
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            if(document.body.classList.contains('dark-mode')) {
                localStorage.setItem('quran_theme_mode', 'dark');
            } else {
                localStorage.setItem('quran_theme_mode', 'light');
            }
        }
    </script>
</body>
</html>
