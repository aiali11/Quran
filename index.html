<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف التهجد - الفيكتور الملكي</title>
    
    <style>
        :root, [data-theme="oled"] {
            --bg: #000000; --txt: #E5E7EB; --gold: #D4AF37; --box: rgba(20, 20, 20, 0.95); --frame-out: #333333; --mark-color: #D4AF37;
            --font-size: 38px; /* حجم كبير لأن الفيكتور يحتاج مساحة ليبرز جماله */
        }
        
        body[data-theme="navy"] { --bg: #0B132B; --txt: #E2E8F0; --gold: #FBBF24; --box: rgba(28, 37, 65, 0.95); --frame-out: #3A506B; --mark-color: #FBBF24; }
        body[data-theme="sepia"] { --bg: #FDF6E3; --txt: #2C1A0B; --gold: #B8860B; --box: rgba(244, 232, 209, 0.95); --frame-out: #8B5A2B; --mark-color: #B8860B; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0; padding: 0; padding-top: 70px; padding-bottom: 90px; 
            background-color: var(--bg); color: var(--txt);
            text-align: center; direction: rtl; /* التوسيط الآن آمن 100% لأننا نستخدم فيكتور */
            transition: background-color 0.4s, color 0.4s; overflow-x: hidden;
            user-select: none; -webkit-user-select: none; cursor: default;
        }

        .container { width: 100%; margin: 0 auto; padding: 10px 15px; box-sizing: border-box; transition: max-width 0.4s ease; }
        body.layout-auto .container { max-width: 95%; } 
        body.layout-phone .container { max-width: 600px; } 
        body.layout-desktop .container { max-width: 100%; padding: 20px 2%; } 

        .glass-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px; 
            background: var(--box); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--frame-out); z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: transform 0.4s ease;
        }
        body.reading-mode .glass-header { transform: translateY(-100%); }

        .icon-btn { background: transparent; color: var(--gold); border: none; font-size: 24px; cursor: pointer; outline: none; }
        .live-location { flex-grow: 1; text-align: center; color: var(--gold); font-size: 16px; font-weight: bold; font-family: Arial, sans-serif;}

        .floating-controls {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: var(--box); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--frame-out); border-radius: 30px;
            display: flex; justify-content: center; align-items: center; padding: 6px 15px; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); z-index: 1000; transition: transform 0.4s ease, opacity 0.4s ease;
        }
        body.reading-mode .floating-controls { transform: translate(-50%, 150%); opacity: 0; }
        .ctrl-btn { background: transparent; color: var(--txt); border: none; font-size: 15px; font-weight: bold; cursor: pointer; padding: 8px 15px; font-family: Arial, sans-serif;}
        .play-btn { background: var(--gold); color: #000; border-radius: 20px; padding: 8px 25px; font-size: 16px; font-weight: bold; }

        /* 👑 هندسة الفيكتور القرآني (QCF) 👑 */
        .quran-word { 
            font-size: var(--font-size); 
            color: var(--txt);
            display: inline-block; /* إجبار الكلمة أن تبقى ككتلة صلبة لا تنكسر */
            line-height: 2.0;
            transition: font-size 0.3s, color 0.3s;
        }
        
        /* تلوين لفظ الجلالة وأرقام الآيات داخل الفيكتور */
        .quran-word.allah { color: var(--mark-color); }
        .quran-word.ayah-end { color: var(--mark-color); margin: 0 5px; font-size: calc(var(--font-size) * 0.9); }

        .sura-header {
            display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 8px;
            border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
            padding: 15px; margin: 40px 0 20px 0; background-color: rgba(255,255,255,0.02);
            border-radius: 8px;
        }
        .sura-name { color: var(--gold); font-size: 24px; font-family: Arial, sans-serif; font-weight: bold;}

        .touch-zone { position: fixed; top: 15%; bottom: 15%; z-index: 500; }
        .touch-left { left: 0; width: 25%; }
        .touch-right { right: 0; width: 25%; }
        .touch-center { left: 25%; width: 50%; }

        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; background: var(--box);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--frame-out); border-radius: 25px 25px 0 0;
            padding: 25px 20px; z-index: 2000; transition: bottom 0.4s ease; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8); font-family: Arial, sans-serif;
            max-height: 85vh; overflow-y: auto;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-title { text-align: center; color: var(--gold); font-weight: bold; margin-bottom: 20px; font-size: 18px; }
        .sheet-close { position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: var(--txt); font-size: 22px; cursor: pointer; }
        
        .settings-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 15px; border-radius: 12px; padding: 5px;}
        .setting-select { background: rgba(128,128,128,0.15); color: var(--txt); border: 1px solid var(--frame-out); padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; outline: none; flex: 1; text-align: center; appearance: none;}
        .size-control { display: flex; justify-content: space-between; align-items: center; background: rgba(128,128,128,0.15); border: 1px solid var(--frame-out); border-radius: 12px; padding: 8px; flex: 1; }
        .sz-btn { background: transparent; border: none; color: var(--txt); font-size: 26px; padding: 0 25px; cursor: pointer; }
        .sz-disp { color: var(--gold); font-weight: bold; font-size: 20px; }
        .tour-trigger-btn { background: var(--gold) !important; color: #000 !important; font-size: 16px; }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: rgba(128,128,128,0.15); color: var(--txt); border: 1px solid var(--frame-out); padding: 10px 20px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; flex: 1; transition: all 0.3s;}
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .search-box { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(0,0,0,0.2); color: var(--txt); font-size: 15px; font-family: Arial, sans-serif; box-sizing: border-box; margin-bottom: 15px; text-align: center; outline: none;}
        
        .index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; max-height: 50vh; overflow-y: auto; padding-right: 5px;}
        .index-grid::-webkit-scrollbar { width: 5px; }
        .index-grid::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 5px; }
        .index-item { background: rgba(128,128,128,0.1); color: var(--txt); border: 1px solid var(--frame-out); padding: 12px 5px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-family: Arial, sans-serif;}
        .index-item:hover { background: rgba(128,128,128,0.3); border-color: var(--gold); }

        .loading-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 16px; font-weight: bold; z-index: 100; background: var(--box); padding: 20px 30px; border-radius: 12px; border: 1px solid var(--gold); display: none; font-family: Arial, sans-serif; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #sentinel { height: 50px; } 

        /* الجولة التعريفية */
        .tour-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .tour-overlay.active { opacity: 1; pointer-events: auto; }
        .tour-box { background: var(--box); border: 2px solid var(--gold); border-radius: 15px; padding: 25px; width: 85%; max-width: 400px; text-align: center; margin-top: -15vh; box-shadow: 0 10px 40px rgba(0,0,0,0.9); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-family: Arial, sans-serif; }
        .tour-overlay.active .tour-box { transform: scale(1); }
        .tour-text { color: var(--txt); font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
        .tour-text b { color: var(--gold); font-size: 17px;}
        .tour-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tour-dot { width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: background 0.3s; }
        .tour-dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .tour-buttons { display: flex; justify-content: space-between; gap: 15px; }
        .tour-btn { padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; border: none; flex: 1; font-family: Arial, sans-serif;}
        .skip-btn { background: rgba(255,255,255,0.15); color: var(--txt); }
        .next-btn { background: var(--gold); color: #000; }
        .tour-highlight { position: relative !important; z-index: 100001 !important; box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--gold), 0 0 30px var(--gold) !important; border-radius: 10px !important; pointer-events: none; background: var(--box) !important; }
    </style>
</head>
<body data-theme="oled" class="layout-auto">

    <div class="glass-header" id="topBar">
        <button class="icon-btn" onclick="openSheet('settingsSheet')">⚙️</button>
        <button class="icon-btn" onclick="toggleFullScreen()" title="ملء الشاشة">⛶</button>
        <div class="live-location" id="liveLocation">جاري التحميل...</div>
        <button class="icon-btn" id="indexBtn" onclick="openSheet('indexSheet')">📖</button>
    </div>

    <div class="touch-zone touch-left" onclick="scrollPage(1)"></div>
    <div class="touch-zone touch-center" onclick="toggleFocus()"></div>
    <div class="touch-zone touch-right" onclick="scrollPage(-1)"></div>

    <div id="loading" class="loading-box">جاري جلب الفيكتور ⏳...</div>

    <div class="container">
        <div id="content"></div>
        <div id="sentinel"></div>
    </div>

    <div class="floating-controls" id="bottomBar">
        <button class="ctrl-btn" onclick="changeSpeed(-0.2)">أبطأ 🐢</button>
        <button class="ctrl-btn play-btn" id="pBtn" onclick="toggleAutoScroll()">تلقائي ⏵ (Space)</button>
        <button class="ctrl-btn" onclick="changeSpeed(0.2)">أسرع 🐇</button>
    </div>

    <div class="bottom-sheet" id="indexSheet">
        <button class="sheet-close" onclick="closeSheets()">✖</button>
        <div class="sheet-title">الفهرس الذكي</div>
        <div class="tabs">
            <button class="tab-btn active" id="tabSurah" onclick="switchIndexTab('surah')">السور</button>
            <button class="tab-btn" id="tabJuz" onclick="switchIndexTab('juz')">الأجزاء</button>
        </div>
        <input type="text" id="suraSearch" class="search-box" placeholder="🔍 ابحث عن سورة..." onkeyup="filterSurahs()">
        <div class="index-grid" id="surahGrid"></div>
        <div class="index-grid" id="juzGrid" style="display:none;"></div>
    </div>

    <div class="bottom-sheet" id="settingsSheet">
        <button class="sheet-close" onclick="closeSheets()">✖</button>
        <div class="sheet-title">إعدادات العرض (الفيكتور)</div>
        
        <div class="settings-row" id="layoutRow">
            <select class="setting-select" id="layoutSelect" onchange="changeLayout(this.value)">
                <option value="auto">📐 أبعاد الشاشة (تلقائي)</option>
                <option value="phone">📱 وضع الجوال (ضيق)</option>
                <option value="desktop">🖥️ ملء الشاشة (عريض جداً)</option>
            </select>
        </div>

        <div class="settings-row" id="themeRow">
            <select class="setting-select" id="themeSelect" onchange="changeTheme(this.value)">
                <option value="oled">🌑 ليلي عميق (OLED)</option>
                <option value="navy">🌌 كحلي هادئ</option>
                <option value="sepia">📜 ورق عتيق</option>
            </select>
            <select class="setting-select" id="colorSelect" onchange="changeColor(this.value)">
                <option value="#D4AF37">✨ تمييز ذهبي (افتراضي)</option>
                <option value="#8B1E13">🔴 تمييز عنابي</option>
                <option value="#16A34A">💚 تمييز أخضر</option>
            </select>
        </div>

        <div class="settings-row" id="sizeRow">
            <div class="size-control">
                <button class="sz-btn" onclick="changeFontSize(2)">+</button>
                <span class="sz-disp" id="sizeDisplay">38</span>
                <button class="sz-btn" onclick="changeFontSize(-2)">-</button>
            </div>
        </div>
        <div class="settings-row">
            <button class="setting-select tour-trigger-btn" onclick="forceStartTour()">💡 تشغيل الجولة التعريفية مرة أخرى</button>
        </div>
    </div>

    <div class="tour-overlay" id="tourOverlay">
        <div class="tour-box">
            <div class="tour-text" id="tourText"></div>
            <div class="tour-dots" id="tourDots"></div>
            <div class="tour-buttons">
                <button class="tour-btn skip-btn" onclick="endTour()">تخطي ✖</button>
                <button class="tour-btn next-btn" id="tourNextBtn" onclick="nextTourStep()">التالي ➔</button>
            </div>
        </div>
    </div>

    <script>
        const suraNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
        const juzStartPages = [1, 22, 42, 62, 82, 102, 122, 142, 162, 182, 202, 222, 242, 262, 282, 302, 322, 342, 362, 382, 402, 422, 442, 462, 482, 502, 522, 542, 562, 582];
        
        let loadedFonts = new Set();
        let currentPageApi = 1;
        let isFetching = false;
        let currentSuraTracker = '';

        let currentFontSize = parseInt(localStorage.getItem('quran_size')) || 38; 
        let sInt; let isS = false; let speed = 0.5;

        // 👑 الحقن الذكي: تحميل ملف الفيكتور الخاص بالصفحة فقط 👑
        function injectVectorFont(pageNum) {
            if (!loadedFonts.has(pageNum)) {
                const style = document.createElement('style');
                style.innerHTML = `
                    @font-face {
                        font-family: 'p${pageNum}';
                        src: url('https://quran.com/fonts/quran/hafs/v1/woff2/p${pageNum}.woff2') format('woff2');
                        font-display: block; /* يخفي الرموز المشوهة حتى يكتمل تحميل الفيكتور الماسي */
                    }
                    .page-${pageNum} { font-family: 'p${pageNum}', sans-serif; }
                `;
                document.head.appendChild(style);
                loadedFonts.add(pageNum);
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            document.documentElement.style.setProperty('--font-size', currentFontSize + 'px');
            document.getElementById('sizeDisplay').innerText = currentFontSize;
            
            let savedTheme = localStorage.getItem('quran_theme_mode') || 'oled';
            document.body.setAttribute('data-theme', savedTheme); document.getElementById('themeSelect').value = savedTheme;
            
            let savedColor = localStorage.getItem('quran_color'); 
            if (savedColor) { document.body.style.setProperty('--mark-color', savedColor); document.body.style.setProperty('--gold', savedColor); document.getElementById('colorSelect').value = savedColor; }
            
            let savedLayout = localStorage.getItem('quran_layout') || 'auto'; 
            document.body.className = 'layout-' + savedLayout; document.getElementById('layoutSelect').value = savedLayout;

            const surahGrid = document.getElementById('surahGrid');
            suraNames.forEach((name, i) => { surahGrid.innerHTML += `<button class="index-item" onclick="startFromChapter(${i+1})">${i+1}. ${name}</button>`; });
            const juzGrid = document.getElementById('juzGrid');
            juzStartPages.forEach((pageNum, i) => { juzGrid.innerHTML += `<button class="index-item" onclick="startFromPage(${pageNum}, 'الجزء ${i+1}')">الجزء ${i+1}</button>`; });

            let savedPage = parseInt(localStorage.getItem('quran_last_page')) || 1;
            startFromPage(savedPage, 'المصحف');

            setTimeout(startTour, 1000);
        });

        // 🌟 المحرك الجبار: جلب الفيكتور عبر واجهة API الإصدار الرابع 🌟
        async function fetchVectorPage(pageNum, append = false) {
            if (pageNum > 604 || isFetching) return;
            isFetching = true;
            
            const loadingBox = document.getElementById('loading');
            loadingBox.style.display = 'block';

            if (!append) { document.getElementById('content').innerHTML = ''; window.scrollTo(0,0); }

            // حقن الفيكتور الخاص بالصفحة
            injectVectorFont(pageNum);

            try {
                // الاتصال بسيرفرات القرآن وجلب كود الفيكتور + النص العادي (للتلوين)
                const response = await fetch(`https://api.quran.com/api/v4/verses/by_page/${pageNum}?words=true&word_fields=code_v1,text_uthmani`);
                const data = await response.json();
                
                let html = '';
                
                data.verses.forEach(verse => {
                    let chapterId = verse.verse_key.split(':')[0];
                    let suraName = suraNames[parseInt(chapterId) - 1];

                    // طباعة ترويسة السورة
                    if (chapterId !== currentSuraTracker) {
                        currentSuraTracker = chapterId;
                        html += `<div class="sura-header"><span class="sura-name">سورة ${suraName}</span></div><br>`;
                        document.getElementById('liveLocation').innerText = `سورة ${suraName}`;
                    }

                    // طباعة كل كلمة كرسمة فيكتور مستقلة ومغلقة!
                    verse.words.forEach(word => {
                        let className = `quran-word page-${pageNum}`;
                        
                        // تلوين لفظ الجلالة
                        if (word.text_uthmani && word.text_uthmani.match(/(ٱللَّهِ|ٱللَّهُ|ٱللَّهَ|لِلَّهِ|اللَّهِ|اللَّهُ|اللَّهَ)/)) {
                            className += ' allah';
                        }
                        
                        // تصغير وتلوين دوائر الآيات
                        if (word.char_type_name === 'end') {
                            className += ' ayah-end';
                        }
                        
                        if(word.code_v1) {
                            html += `<span class="${className}">${word.code_v1}</span> `;
                        }
                    });
                });

                document.getElementById('content').insertAdjacentHTML('beforeend', html);
                currentPageApi = pageNum;
                localStorage.setItem('quran_last_page', pageNum);
                
            } catch (error) { console.error("Error:", error); loadingBox.innerHTML = `❌ حدث خطأ بالاتصال`; setTimeout(()=>{loadingBox.style.display='none';}, 2000); } 
            finally { isFetching = false; loadingBox.style.display = 'none'; }
        }

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isFetching && document.getElementById('content').innerHTML !== '') { 
                fetchVectorPage(currentPageApi + 1, true); 
            }
        }, { rootMargin: '500px' });
        observer.observe(document.getElementById('sentinel'));

        async function startFromChapter(chapterId) {
            closeSheets(); document.getElementById('loading').style.display = 'block';
            try {
                const res = await fetch(`https://api.quran.com/api/v4/chapters/${chapterId}`);
                const data = await res.json();
                const startPage = data.chapter.pages[0];
                currentSuraTracker = ''; 
                fetchVectorPage(startPage, false);
            } catch(e){}
        }

        function startFromPage(pageNum, label) {
            closeSheets();
            document.getElementById('liveLocation').innerText = label;
            currentSuraTracker = '';
            fetchVectorPage(pageNum, false);
        }

        // الجولة التعريفية ووظائف الواجهة
        const tourSteps = [
            { id: null, action: () => closeSheets(), text: "👋 <b>مرحباً بك في مصحف التهجد (نسخة الفيكتور)!</b><br><br>الآن الآيات تعرض كرسومات عالية الدقة خالية من الأخطاء والتقطيع." },
            { id: 'indexBtn', action: () => openSheet('indexSheet'), text: "📖 <b>الفهرس الذكي</b><br><br>محرك بحث فوري لتصل لسورتك بضغطة زر!" },
            { id: 'sizeRow', action: () => openSheet('settingsSheet'), text: "🔍 <b>حجم الآيات</b><br><br>الفيكتور يسمح لك بتكبير الخط لأي حجم دون أن يفقد دقته!" },
            { id: 'pBtn', action: () => closeSheets(), text: "⏵ <b>التمرير التلقائي</b><br><br>شغّل هذا الزر ليتدفق النص أمامك تلقائياً كشريط سينمائي." },
            { id: null, action: () => closeSheets(), text: "✨ <b>أنت جاهز للانطلاق!</b><br><br>ارفع المشروع على GitHub واقرأ بخشوع.<br>تقبل الله طاعتك 🤲" }
        ];
        
        let currentTourStep = 0;
        function forceStartTour() { closeSheets(); currentTourStep = 0; document.body.classList.remove('reading-mode'); document.getElementById('tourOverlay').classList.add('active'); showTourStep(); }
        function startTour() { if(localStorage.getItem('quran_tour_v7')) return; document.body.classList.remove('reading-mode'); document.getElementById('tourOverlay').classList.add('active'); showTourStep(); }
        function showTourStep() {
            document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
            const step = tourSteps[currentTourStep];
            if (step.action) step.action();
            document.getElementById('tourText').innerHTML = step.text;
            setTimeout(() => { if(step.id) { const target = document.getElementById(step.id); if(target) target.classList.add('tour-highlight'); } }, 400); 
            let dotsHtml = '';
            for(let i=0; i<tourSteps.length; i++) { dotsHtml += `<div class="tour-dot ${i === currentTourStep ? 'active' : ''}"></div>`; }
            document.getElementById('tourDots').innerHTML = dotsHtml;
            if(currentTourStep === tourSteps.length - 1) { document.getElementById('tourNextBtn').innerText = "ابدأ القراءة 📖"; } else { document.getElementById('tourNextBtn').innerText = "التالي ➔"; }
        }
        function nextTourStep() { if(currentTourStep < tourSteps.length - 1) { currentTourStep++; showTourStep(); } else { endTour(); } }
        function endTour() { document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight')); document.getElementById('tourOverlay').classList.remove('active'); closeSheets(); localStorage.setItem('quran_tour_v7', 'true'); }

        function switchIndexTab(tab) {
            document.getElementById('surahGrid').style.display = tab === 'surah' ? 'grid' : 'none';
            document.getElementById('suraSearch').style.display = tab === 'surah' ? 'block' : 'none';
            document.getElementById('juzGrid').style.display = tab === 'juz' ? 'grid' : 'none';
            document.getElementById('tabSurah').classList.toggle('active', tab === 'surah');
            document.getElementById('tabJuz').classList.toggle('active', tab === 'juz');
        }
        function filterSurahs() { let input = document.getElementById('suraSearch').value; document.querySelectorAll('#surahGrid .index-item').forEach(btn => { btn.style.display = btn.innerText.includes(input) ? '' : 'none'; }); }
        function openSheet(id) { closeSheets(); document.getElementById(id).classList.add('active'); document.body.classList.remove('reading-mode'); }
        function closeSheets() { document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active')); }
        function toggleFocus() { document.body.classList.toggle('reading-mode'); closeSheets(); }
        function changeTheme(val) { document.body.setAttribute('data-theme', val); localStorage.setItem('quran_theme_mode', val); }
        function changeLayout(val) { document.body.className = 'layout-' + val; localStorage.setItem('quran_layout', val); }
        function changeColor(val) { document.body.style.setProperty('--mark-color', val); document.body.style.setProperty('--gold', val); localStorage.setItem('quran_color', val); }
        function changeFontSize(step) {
            currentFontSize += step; if(currentFontSize < 20) currentFontSize = 20; if(currentFontSize > 150) currentFontSize = 150;
            document.documentElement.style.setProperty('--font-size', currentFontSize + 'px');
            document.getElementById('sizeDisplay').innerText = currentFontSize; localStorage.setItem('quran_size', currentFontSize);
        }
        function toggleFullScreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } else { if (document.exitFullscreen) { document.exitFullscreen(); } } }
        function scrollPage(direction) { window.scrollBy({ top: direction * (window.innerHeight * 0.85), behavior: 'smooth' }); document.body.classList.add('reading-mode'); }
        function toggleAutoScroll() {
            const btn = document.getElementById('pBtn');
            if (isS) { clearInterval(sInt); isS = false; btn.innerHTML = 'تلقائي ⏵'; btn.style.backgroundColor = 'var(--gold)'; btn.style.color = '#000'; } 
            else { sInt = setInterval(() => window.scrollBy({ top: speed * 3, behavior: 'auto' }), 50); isS = true; btn.innerHTML = 'إيقاف ⏸'; btn.style.backgroundColor = '#DC2626'; btn.style.color = 'white'; document.body.classList.add('reading-mode'); closeSheets(); }
        }
        function changeSpeed(v) { speed = Math.max(0.2, Math.min(speed + v, 5)); }
        
        let cursorTimeout;
        window.addEventListener('mousemove', () => { document.body.classList.remove('hide-cursor'); clearTimeout(cursorTimeout); if (isS) { cursorTimeout = setTimeout(() => { document.body.classList.add('hide-cursor'); }, 3000); } });
        document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); toggleAutoScroll(); } if (e.code === 'ArrowDown' || e.code === 'ArrowLeft') { e.preventDefault(); scrollPage(1); } if (e.code === 'ArrowUp' || e.code === 'ArrowRight') { e.preventDefault(); scrollPage(-1); } });
    </script>
</body>
</html>
